<!DOCTYPE html>
<html>
<head>
    <title>GSTP Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2 class="mb-4">GST Practitioner Search</h2>

    <div class="row">
        <div class="col-md-3">
            <input id="name" class="form-control" placeholder="Name">
        </div>

        <div class="col-md-3">
            <input id="state" class="form-control" placeholder="State">
        </div>

        <div class="col-md-3">
            <input id="district_code" class="form-control" placeholder="District">
        </div>

        <div class="col-md-3">
            <input id="pincode" class="form-control" placeholder="Pincode">
        </div>
    </div>

    <button class="btn btn-primary mt-3" onclick="searchData()">Search</button>

    <table class="table table-bordered table-striped mt-4">
        <thead>
            <tr>
                <th>Enrollment No</th>
                <th>Name</th>
                <th>Pincode</th>
                <th>Mobile</th>
                <th>Email</th>
                <th>State</th>
                <th>District</th>
                <th>Address</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="result"></tbody>
    </table>

</div>

<script>
async function searchData() {
    const name = document.getElementById("name").value;
    const state = document.getElementById("state").value;
    const district = document.getElementById("district_code").value;
    const pincode = document.getElementById("pincode").value;

    const url =
    `/api/search?name=${encodeURIComponent(name)}&state=${encodeURIComponent(state)}&district=${encodeURIComponent(district)}&pincode=${encodeURIComponent(pincode)}`;
    const res = await fetch(url);
    const data = await res.json();

if (!Array.isArray(data)) {
    alert(data.error || "Server error");
    return;
}

    const result = document.getElementById("result");
    result.innerHTML = "";

    if (data.length === 0) {
        result.innerHTML = `
            <tr>
                <td colspan="7" class="text-center">
                    No records found
                </td>
            </tr>
        `;
        return;
    }

    data.forEach(row => {
        result.innerHTML += `
            <tr>
                <td>${row.enrollment_no || ""}</td>
                <td>${row.name || ""}</td>
                <td>${row.pincode || ""}</td>
                <td>${row.mobile_no || ""}</td>
                <td>${row.email_id || ""}</td>
                <td>${row.state_name || row.state_code || ""}</td>
                <td>${row.district_name || row.district_code || ""}</td>
                <td>${row.address || ""}</td>
                <td>${row.status === "Activ" ? "Active" : row.status || ""}</td>
            </tr>
        `;
    });
}
</script>

</body>
</html>
